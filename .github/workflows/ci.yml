name: CI

on:
  push:
    branches: [main]
    paths:
      - "meeting-mate-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "meeting-mate-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: meeting-mate-app

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: meeting-mate-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: meeting-mate-app/server

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: meeting-mate-app/server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ruff
        run: pip install ruff==0.15.5

      - name: Lint (ruff)
        run: ruff check .

      - name: Import check
        run: python -c "from main import app; print('App import OK:', app.title)"
